# gateway-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wpai-webchat
  labels:
    app: wpai-webchat
  namespace: wpai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wpai-webchat
  template:
    metadata:
      labels:
        app: wpai-webchat
    spec:
      containers:
      - name: wpai-webchat
        image: wpai-webchat:v1.2.1
        ports:
        - containerPort: 9204
        resources:
          requests:
            memory: "1024Mi"
            cpu: "100m"
          limits:
            memory: "1024Mi"
            cpu: "500m"
        args:
          ["nohup","java","-jar","/usr/local/wpai/txwx-webchat.jar", ">", "/usr/local/wpai/logs/txwx-webchat/nohup.log", "&"]
      nodeSelector:
        kubernetes.io/hostname: k8s2.txwx.com
