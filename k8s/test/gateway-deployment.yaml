# gateway-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wpai-gateway
  labels:
    app: wpai-gateway
  namespace: wpai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wpai-gateway
  template:
    metadata:
      labels:
        app: wpai-gateway
    spec:
      containers:
      - name: wpai-gateway
        image: wpai-gateway:v1.0.0
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        args:
          ["nohup","java","-jar","/usr/local/wpai/ruoyi-gateway.jar", ">", "/usr/local/wpai/logs/ruoyi-gateway/nohup.log", "&"]
